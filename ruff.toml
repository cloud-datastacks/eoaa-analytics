# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

output-format = "full"
fix = false

# Configure line length
line-length = 110
indent-width = 4

# Assume Python 3.13
target-version = "py313"

[lint]
# Enable rulesets that closely align with Pylint
select = [
    "C",    # complexity
    "D",    # pydocstyle
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "PL",   # pylint
    "RUF"   # ruff-specific
]

# You can ignore specific rules here if needed
ignore = [
    "D104",     # Missing docstring in public package
    "PLR0913",  # Too many arguments in function
    "C901",     # Too complex function
    "PLR2004",  # Magic value used in comparison
    "D203",     # conflicts with D211 (Google style prefers no blank line before class docstring)
    "D213",     # conflicts with D212 (Google style prefers summary on first line)
]

# Add the line-too-long rule to the enforced rule set
extend-select = ["E501"]

[format]
# Like Black, use double quotes for strings
quote-style = "double"
# Like Black, indent with spaces, rather than tabs
indent-style = "space"
line-ending = "lf"
